<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#1f2a3f",
                        "tertiary": "#c5cbd1",
                        "surface-bright": "#2e394f",
                        "surface-variant": "#2a354a",
                        "error": "#ffb4ab",
                        "on-tertiary-fixed-variant": "#41484c",
                        "error-container": "#93000a",
                        "on-surface-variant": "#bfc8cd",
                        "on-secondary-container": "#a7b3e4",
                        "secondary-container": "#38456f",
                        "secondary-fixed": "#dbe1ff",
                        "on-tertiary-fixed": "#161c20",
                        "surface-tint": "#8cd0ec",
                        "background": "#071327",
                        "on-secondary-fixed": "#0a1941",
                        "inverse-surface": "#d7e2ff",
                        "outline": "#899297",
                        "on-error-container": "#ffdad6",
                        "on-surface": "#d7e2ff",
                        "on-primary-fixed-variant": "#004d62",
                        "surface": "#071327",
                        "tertiary-fixed-dim": "#c1c7cd",
                        "inverse-primary": "#15667f",
                        "on-secondary-fixed-variant": "#38456f",
                        "primary-container": "#74b8d3",
                        "on-primary": "#003544",
                        "tertiary-container": "#a9b0b5",
                        "on-error": "#690005",
                        "primary": "#90d4ef",
                        "on-tertiary": "#2a3136",
                        "on-tertiary-container": "#3c4348",
                        "on-primary-fixed": "#001f29",
                        "on-secondary": "#212e57",
                        "surface-container-highest": "#2a354a",
                        "surface-dim": "#071327",
                        "secondary-fixed-dim": "#b8c5f6",
                        "surface-container-lowest": "#030e22",
                        "primary-fixed": "#b9eaff",
                        "outline-variant": "#3f484c",
                        "tertiary-fixed": "#dde3e9",
                        "on-primary-container": "#00485c",
                        "surface-container-low": "#101b30",
                        "secondary": "#b8c5f6",
                        "primary-fixed-dim": "#8cd0ec",
                        "on-background": "#d7e2ff",
                        "inverse-on-surface": "#253046",
                        "surface-container": "#142034"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-login-gradient {
            background: radial-gradient(circle at top right, rgba(116, 184, 211, 0.08), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(116, 184, 211, 0.05), transparent 30%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col items-center justify-center p-6 bg-login-gradient">
<!-- Top Branding -->
<header class="w-full max-w-md flex flex-col items-center mb-12">
<div class="mb-8">
<span class="text-3xl font-black text-primary-container tracking-tighter">KUMAR</span>
</div>
<h1 class="text-3xl font-extrabold text-on-surface tracking-tight text-center">Bienvenido de nuevo</h1>
<p class="text-secondary-text text-[#7d8489] mt-2 font-medium">Ingresa tus credenciales para continuar</p>
</header>
<!-- Login Form -->
<main class="w-full max-w-md space-y-6">
<div class="space-y-4">
<!-- Email Input -->
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-[#7d8489]">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full bg-[#132149] border-[#7d8489] focus:border-primary-container focus:ring-1 focus:ring-primary-container text-on-surface placeholder:text-[#7d8489] rounded-xl py-4 pl-12 pr-4 transition-all duration-200 outline-none" placeholder="Correo electrónico" type="email"/>
</div>
<!-- Password Input -->
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-[#7d8489]">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full bg-[#132149] border-[#7d8489] focus:border-primary-container focus:ring-1 focus:ring-primary-container text-on-surface placeholder:text-[#7d8489] rounded-xl py-4 pl-12 pr-12 transition-all duration-200 outline-none" placeholder="Contraseña" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-[#7d8489] hover:text-primary-container transition-colors">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end">
<a class="text-sm font-semibold text-primary-container hover:opacity-80 transition-opacity" href="#">¿Olvidaste tu contraseña?</a>
</div>
<!-- Action Buttons -->
<div class="space-y-4 pt-4">
<button class="w-full bg-primary-container text-background font-bold py-4 rounded-[16px] text-lg active:scale-[0.98] transition-transform shadow-xl shadow-black/20">
                Iniciar Sesión
            </button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-[#7d8489]/20"></div>
<span class="flex-shrink mx-4 text-[#7d8489] text-xs font-bold uppercase tracking-widest">O</span>
<div class="flex-grow border-t border-[#7d8489]/20"></div>
</div>
<button class="w-full bg-transparent border border-primary-container/40 text-on-surface font-semibold py-4 rounded-[16px] flex items-center justify-center gap-3 hover:bg-primary-container/5 active:scale-[0.98] transition-all">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span>Iniciar con Google</span>
</button>
</div>
</main>
<!-- Footer Area -->
<footer class="mt-auto pt-12 pb-8 w-full max-w-md flex flex-col items-center gap-8">
<!-- Biometric Option -->
<div class="flex flex-col items-center gap-2 group cursor-pointer">
<div class="w-16 h-16 rounded-full border border-primary-container/20 flex items-center justify-center bg-[#132149] group-hover:border-primary-container transition-colors duration-300">
<span class="material-symbols-outlined text-primary-container text-3xl">face</span>
</div>
<span class="text-xs font-bold text-[#7d8489] uppercase tracking-widest">Usar Biometría</span>
</div>
<!-- Registration Link -->
<p class="text-[#7d8489] font-medium">
            ¿No tienes cuenta? 
            <a class="text-primary-container font-bold ml-1 hover:underline" href="#">Regístrate</a>
</p>
</footer>
<!-- Decorative Elements (The "Celestial Curator" Touch) -->
<div class="fixed top-[-10%] right-[-5%] w-64 h-64 bg-primary-container/5 rounded-full blur-[80px] pointer-events-none"></div>
<div class="fixed bottom-[-5%] left-[-10%] w-80 h-80 bg-primary-container/5 rounded-full blur-[100px] pointer-events-none"></div>
</body></html>
