                    "tertiary-fixed": "#dde3e9",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes shimmer {
            0% { opacity: 0.3; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.3; transform: scale(0.98); }
        }
        .animate-celestial-shimmer {
            animation: shimmer 3s ease-in-out infinite;
        }
        .loader-ring {
            border: 2px solid rgba(116, 184, 211, 0.1);
            border-top: 2px solid #74b8d3;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-background selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col overflow-hidden">
<!-- Splash Screen Canvas -->
<main class="flex-grow flex flex-col items-center justify-center relative p-8">
<!-- Ambient Celestial Glows -->
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-secondary/5 rounded-full blur-[100px]"></div>
<!-- Central Branding Cluster -->
<div class="relative z-10 flex flex-col items-center gap-12">
<!-- Logo Container with Glassmorphism Elevation -->
<div class="relative group">
<div class="absolute inset-0 bg-primary/20 rounded-[2.5rem] blur-2xl group-hover:blur-3xl transition-all duration-700 animate-celestial-shimmer"></div>
<div class="relative w-32 h-32 md:w-40 md:h-40 rounded-[2.5rem] bg-surface-container-low flex items-center justify-center p-6 border border-outline-variant/10 shadow-2xl shadow-black/40 overflow-hidden">
<img alt="KUMAR Store Premium Logo" class="w-full h-full object-contain filter drop-shadow-[0_4px_12px_rgba(116,184,211,0.3)]" data-alt="Metallic celestial logo for KUMAR store, featuring sleek curves and a midnight navy and celeste color palette, high-end editorial style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDgUm06-8a0BA8CVW6OwnRerDB94uzyDnZjI2O6sH9jS3Swv8lIX2EJUUuI4Y3Aj5zhfPSaI5aqPH0pI4x6ZX4yrFQS-tS3VrT9HGpUcjGQBST3UToh2EzEF7uqSYk8mWb_IDZJ10yzlCWOpzGG_VR485ejdA6AH_RGnHtg8csnej-U-sSho73IgaI3oJx15EWha-tFwtwnWXGmPLT_3eMqQZAjR1K2-d6SbO3llZHzGtldJ6ftjFVwzxjigiLrFA57aenSPY_jdrRp"/>
</div>
</div>
<!-- Typography Anchor -->
<div class="text-center space-y-3">
<h1 class="text-4xl md:text-5xl font-black tracking-tighter text-primary-container font-headline uppercase">
                    KUMAR Store
                </h1>
<p class="text-secondary-text font-label text-sm md:text-base tracking-[0.2em] font-light uppercase opacity-60">
                    The Celestial Curator
                </p>
</div>
<!-- Discrete Loading Indicator -->
<div class="mt-8 flex flex-col items-center gap-4">
<div class="loader-ring"></div>
<span class="text-xs font-label text-outline tracking-widest uppercase animate-pulse">
                    Initializing
                </span>
</div>
</div>
<!-- Footer Branding (Minimalist) -->
<div class="absolute bottom-12 text-center">
<div class="flex items-center gap-2 text-outline-variant/50">
<span class="h-[1px] w-8 bg-current"></span>
<span class="text-[10px] font-label tracking-widest uppercase">Premium Retail Experience</span>
<span class="h-[1px] w-8 bg-current"></span>
</div>
</div>
</main>
<!-- Navigation Suppressed as per "The Destination Rule" & "Splash Screen" requirements -->
<!-- This screen represents a transactional/loading state, thus global shells are omitted to maintain focus -->
</body></html>
